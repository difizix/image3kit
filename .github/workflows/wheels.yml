name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main
  release:
    types:
      - published

env:
  FORCE_COLOR: 3
  CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -v -w {dest_dir} {wheel}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-sdist
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: astral-sh/setup-uv@v7

    - name: Add Windows Defender exclusions
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Add-MpPreference -ExclusionPath "${{ github.workspace }}"
        Add-MpPreference -ExclusionPath $env:TEMP

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libomp
        PREFIX=$(brew --prefix libomp)
        TARGET="11.0"
        LLVM_VERSION="18.1.8"
        work=$(mktemp -d)
        cd "$work"
        base=https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}
        curl -fsSL -o openmp.tar.xz "${base}/openmp-${LLVM_VERSION}.src.tar.xz"
        curl -fsSL -o cmake.tar.xz  "${base}/cmake-${LLVM_VERSION}.src.tar.xz"
        tar -xf openmp.tar.xz
        tar -xf cmake.tar.xz
        mv "cmake-${LLVM_VERSION}.src" cmake
        cd "openmp-${LLVM_VERSION}.src"
        cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${TARGET}" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DCMAKE_INSTALL_NAME_DIR="${PREFIX}/lib" \
            -DLIBOMP_INSTALL_ALIASES=OFF \
            -DOPENMP_ENABLE_LIBOMPTARGET=OFF
        cmake --build build --parallel
        cmake --install build
        echo "OpenMP_ROOT=${PREFIX}" >> $GITHUB_ENV

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        $triplet = "${{ matrix.os == 'windows-11-arm' && 'arm64' || 'x64' }}-windows"
        vcpkg install zlib:$triplet
        echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
        echo "$env:VCPKG_INSTALLATION_ROOT/installed/$triplet/bin" >> $env:GITHUB_PATH
      shell: pwsh

    - name: Find correct LLVM OpenMP DLL (Windows ARM64)
      if: matrix.os == 'windows-11-arm'
      run: |
        $libomp = Get-ChildItem -Path "C:\Program Files" -Filter libomp140.aarch64.dll -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($libomp) {
          echo "LIBOMP_DIR=$($libomp.DirectoryName)" >> $env:GITHUB_ENV
          echo "Found libomp at $($libomp.DirectoryName)"
          echo ('CIBW_REPAIR_WHEEL_COMMAND_WINDOWS=delvewheel repair -v -w {dest_dir} {wheel} --add-path "' + $libomp.DirectoryName + '"') >> $env:GITHUB_ENV
        } else {
          echo "::warning ::libomp140.aarch64.dll not found!"
        }
      shell: pwsh

    - uses: pypa/cibuildwheel@v4.1
      env:
        CIBW_ENABLE: cpython-prerelease
        CIBW_SKIP: "cp39-* cp310-* cp311-win_arm64 cp311-win32 cp312-win32"
        CIBW_TEST_SKIP: "cp315*"  # numpy has no cp315/cp315t wheels yet (3.15 is still beta); skip tests, still build the wheel
        CIBW_ARCHS_WINDOWS: ${{ matrix.os == 'windows-11-arm' && 'ARM64' || 'AMD64' }}
        MACOSX_DEPLOYMENT_TARGET: "11.0"
        CIBW_ENVIRONMENT_WINDOWS: SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        CIBW_ENVIRONMENT_MACOS: OpenMP_ROOT=$OpenMP_ROOT

    - name: Verify clean directory
      run: |
        git status
        git diff --exit-code
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl


  upload_all:
    name: Upload if release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write
      attestations: write

    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - uses: actions/download-artifact@v8
      with:
        pattern: cibw-*
        merge-multiple: true
        path: dist

    - name: Generate artifact attestation for sdist and wheels
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: "dist/*"

    - uses: pypa/gh-action-pypi-publish@release/v1
